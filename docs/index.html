<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prisma Win Legal</title>
  <meta name="description" content="Legal documents for the Prisma Win Android app.">
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe5;
      --ink: #1f261f;
      --muted: #667064;
      --card: #fffaf0;
      --line: #ddd2bd;
      --accent: #d5552d;
      --accent-2: #244f3a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, 'Times New Roman', serif;
      background:
        radial-gradient(circle at top left, rgba(213,85,45,.18), transparent 34rem),
        radial-gradient(circle at bottom right, rgba(36,79,58,.16), transparent 32rem),
        var(--bg);
      color: var(--ink);
      line-height: 1.6;
    }
    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 18px;
    }
    .card {
      width: min(760px, 100%);
      background: rgba(255,250,240,.9);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: clamp(28px, 6vw, 64px);
      box-shadow: 0 24px 80px rgba(31,38,31,.12);
    }
    .eyebrow {
      color: var(--accent);
      font: 700 12px/1.2 Arial, sans-serif;
      letter-spacing: .18em;
      text-transform: uppercase;
      margin: 0 0 18px;
    }
    h1 {
      font-size: clamp(42px, 8vw, 82px);
      line-height: .92;
      letter-spacing: -.06em;
      margin: 0 0 22px;
    }
    p {
      max-width: 58ch;
      color: var(--muted);
      font-size: 18px;
      margin: 0 0 28px;
    }
    a {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: var(--accent-2);
      color: #fffaf0;
      padding: 14px 20px;
      text-decoration: none;
      font: 700 15px/1 Arial, sans-serif;
    }
    a:focus, a:hover { background: var(--accent); }
  </style>
</head>
<body>
  <main>
    <section class="card" aria-labelledby="title">
      <p class="eyebrow">Prisma Win</p>
      <h1 id="title">Legal documents</h1>
      <p>Public legal documents for the Prisma Win Android application.</p>
      <a href="privacy-policy.html">Open Privacy Policy</a>
    </section>
  </main>
</body>
</html>
